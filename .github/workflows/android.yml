name: Build Android APK

on:
  push:
    branches:
      - develop
    paths:
      - 'apps/android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate version code
        id: version
        run: |
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Calculated version code: $VERSION_CODE"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: 'pnpm'

      - name: Install api-spec dependencies
        working-directory: .
        run: pnpm --filter @aurboda/api-spec install

      - name: Generate Kotlin models from OpenAPI
        working-directory: .
        run: pnpm --filter @aurboda/api-spec build && pnpm --filter @aurboda/api-spec generate

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > app/aurboda-release.keystore

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "aurbodaApiToken=${{ secrets.AURBODA_API_TOKEN }}" >> local.properties
          echo "KEYSTORE_FILE=aurboda-release.keystore" >> local.properties
          echo "KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> local.properties
          echo "KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> local.properties
          echo "KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> local.properties

      - name: Build release APK
        env:
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
        run: ./gradlew assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: aurboda-release-apk
          path: apps/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: apps/android/app/build/reports/tests/
          retention-days: 7

      - name: Prepare APK for release
        if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
        run: cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/aurboda.apk

      - name: Generate version.json
        if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
        run: |
          cat > app/build/outputs/apk/release/version.json << EOF
          {
            "versionCode": ${{ steps.version.outputs.VERSION_CODE }},
            "versionName": "1.0.${{ steps.version.outputs.VERSION_CODE }}",
            "downloadUrl": "https://github.com/${{ github.repository }}/releases/latest/download/aurboda.apk",
            "releaseNotes": "Built from commit ${{ github.sha }}"
          }
          EOF

      - name: Update latest release
        if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ${{ github.workspace }}
          # Delete existing latest release if it exists
          gh release delete latest --yes || true
          # Delete the tag locally and remotely
          git tag -d latest || true
          git push origin :refs/tags/latest || true
          # Create new release with the APK and version.json
          gh release create latest \
            --title "Latest Development Build" \
            --notes "Automatically updated on each push to develop.

          **Download:** [aurboda.apk](https://github.com/${{ github.repository }}/releases/latest/download/aurboda.apk)

          Built from commit: ${{ github.sha }}
          Version code: ${{ steps.version.outputs.VERSION_CODE }}" \
            apps/android/app/build/outputs/apk/release/aurboda.apk \
            apps/android/app/build/outputs/apk/release/version.json
