name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      node: ${{ steps.filter.outputs.node }}
      android: ${{ steps.filter.outputs.android }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            node:
              - 'apps/backend/**'
              - 'apps/web/**'
              - 'packages/api-spec/**'
              - 'scripts/**'
              - 'pnpm-lock.yaml'
              - '.github/workflows/ci.yml'
            android:
              - 'apps/android/**'
              - 'packages/api-spec/**'
              - '.github/workflows/ci.yml'

  node:
    name: Node (test, check, build)
    needs: changes
    if: needs.changes.outputs.node == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build api-spec package
        run: pnpm --filter @aurboda/api-spec build

      - name: Lint
        run: pnpm exec oxlint

      - name: Run TypeScript checks
        run: pnpm check

      - name: Run backend tests with coverage
        run: pnpm --filter aurboda-backend test run --coverage

      - name: Check coverage against baseline
        run: node scripts/check-coverage.mjs apps/backend/coverage/coverage-final.json apps/backend/coverage-baseline.json

      - name: Run web tests
        run: pnpm --filter aurboda-web test run

      - name: Build web
        run: pnpm --filter aurboda-web build

  android:
    name: Android (test, build)
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'pnpm'

      - name: Install api-spec dependencies
        run: pnpm --filter @aurboda/api-spec install
        working-directory: .

      - name: Generate Kotlin models from OpenAPI
        run: pnpm --filter @aurboda/api-spec build && pnpm --filter @aurboda/api-spec generate
        working-directory: .

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "aurbodaApiToken=${{ secrets.AURBODA_API_TOKEN }}" >> local.properties

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew assembleDebug

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [node, android]
    steps:
      - name: Check job results
        run: |
          echo "Node: ${{ needs.node.result }}"
          echo "Android: ${{ needs.android.result }}"
          if [[ "${{ needs.node.result }}" == "failure" || "${{ needs.android.result }}" == "failure" ]]; then
            echo "❌ One or more jobs failed"
            exit 1
          fi
          if [[ "${{ needs.node.result }}" == "cancelled" || "${{ needs.android.result }}" == "cancelled" ]]; then
            echo "⚠️ One or more jobs were cancelled"
            exit 1
          fi
          echo "✅ All jobs passed or were skipped"
