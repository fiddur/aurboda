name: CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  node:
    name: Node (test, check, build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build api-spec package
        run: pnpm --filter @aurboda/api-spec build

      - name: Run TypeScript checks
        run: pnpm check

      - name: Run backend tests with coverage
        run: pnpm --filter aurboda-backend test run --coverage

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/backend/coverage/coverage-final.json
          flags: backend
          fail_ci_if_error: false

      - name: Run web tests with coverage
        run: pnpm --filter aurboda-web test run --coverage

      - name: Upload web coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/web/coverage/coverage-final.json
          flags: web
          fail_ci_if_error: false

      - name: Build web
        run: pnpm --filter aurboda-web build

  android:
    name: Android (test, build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "aurbodaApiToken=${{ secrets.AURBODA_API_TOKEN }}" >> local.properties

      - name: Run unit tests with coverage
        run: ./gradlew testDebugUnitTest jacocoTestReport

      - name: Upload Android coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/android/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          flags: android
          fail_ci_if_error: false

      - name: Build debug APK
        run: ./gradlew assembleDebug
