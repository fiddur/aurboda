# Docker images are tagged as:
#   latest  - stable releases (from main branch)
#   develop - development builds (from develop branch)
# Change :latest to :develop below to use development builds.

services:
  aurboda:
    image: fiddur/aurboda:latest
    ports:
      - "80:80"
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=aurboda_service
      - PGPASSWORD=REPLACE_DB_PASSWORD
      - SESSION_SECRET=REPLACE_SESSION_SECRET
      - ALLOW_SIGNUP=${ALLOW_SIGNUP:-true}
      - WEB_HOST=http://localhost
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgis/postgis:16-3.4-alpine
    command: postgres -c max_connections=200
    environment:
      - POSTGRES_USER=aurboda_service
      - POSTGRES_PASSWORD=REPLACE_DB_PASSWORD
      - POSTGRES_DB=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aurboda_service"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400
    restart: unless-stopped

volumes:
  postgres_data:
