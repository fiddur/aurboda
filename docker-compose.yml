services:
  aurboda-web:
    image: ghcr.io/fiddur/aurboda-web:latest
    ports:
      - "8080:80"
    depends_on:
      - aurboda-backend
    restart: unless-stopped

  aurboda-backend:
    image: ghcr.io/fiddur/aurboda-backend:latest
    ports:
      - "3000:3000"
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=aurboda_service
      - PGPASSWORD=aurboda_dev_password
      - SESSION_SALT=${SESSION_SALT:-change_this_to_32_byte_secret!!}
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      - POSTGRES_USER=aurboda_service
      - POSTGRES_PASSWORD=aurboda_dev_password
      - POSTGRES_DB=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aurboda_service"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400
    restart: unless-stopped

volumes:
  postgres_data:
